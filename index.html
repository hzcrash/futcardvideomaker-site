<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Video Maker for FC 26</title>
    <meta name="description" content="Create stunning video reveals for your FC 26 cards.">
    <style>
        :root {
            --primary-color: #1a1a1a;
            --accent-color: #dbf24d; /* High-vis green/yellow often used in sports apps */
            --text-color: #ffffff;
            --secondary-text: #a0a0a0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--primary-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 800px;
            padding: 2rem;
            text-align: center;
        }

        .logo {
            width: 120px;
            height: 120px;
            margin-bottom: 1.5rem;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.05);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #ffffff 0%, #a0a0a0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.1rem;
            color: var(--secondary-text);
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            background-color: var(--accent-color);
            color: #000;
            padding: 12px 32px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            margin: 0.5rem;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(219, 242, 77, 0.3);
        }

        .btn-outline {
            background-color: transparent;
            color: var(--text-color);
            border: 2px solid rgba(255,255,255,0.2);
        }

        .btn-outline:hover {
            border-color: var(--text-color);
            background-color: rgba(255,255,255,0.05);
        }

        footer {
            margin-top: auto;
            padding: 2rem;
            color: var(--secondary-text);
            font-size: 0.9rem;
        }

        footer a {
            color: var(--secondary-text);
            text-decoration: none;
            margin: 0 10px;
            transition: color 0.2s;
        }

        footer a:hover {
            color: var(--accent-color);
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="app-icon.png" alt="App Icon" class="logo">
        <h1>Card Video Maker for FC 26</h1>
        <p>Create professional video reveals for your ultimate team cards. Customize, animate, and share your squad with the world.</p>
        
        <!-- Placeholder for Google Play link if available, otherwise just visual -->
        <!-- <a href="#" class="btn">Download on Google Play</a> -->
        <a href="privacy-policy.html" class="btn btn-outline">Privacy Policy</a>
    </div>

    <footer>
        <p>&copy; 2026 FUT Card Video Maker. All rights reserved.</p>
        <p>
            <a href="privacy-policy.html">Privacy Policy</a> | 
            <a href="app-ads.txt">AdMob Verification</a>
        </p>
    </footer>
</body>
</html>
